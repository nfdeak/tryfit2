version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dietapp
      POSTGRES_PASSWORD: dietapp123
      POSTGRES_DB: dietapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dietapp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
